
version: "3.9"

services:
  # ── Application Python ─────────────────────────────
  conversation-orchestrator:
    build:
      context: .
      dockerfile: ./conversation-orchestrator/Dockerfile
    container_name: conversation-orchestrator
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://chatbot_user:motdepasse@postgres:5432/banking_chatbot
      PYTHONPATH: /app
    depends_on:
      - postgres
    ports:
      - "8001:8001"  # exposer l'API
    

  # ── PostgreSQL ───────────────────────────────────
  postgres:
    image: postgres:15
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: chatbot_user
      POSTGRES_PASSWORD: motdepasse
      POSTGRES_DB: banking_chatbot
    ports:
      - "5432:5432"
   
  # ── Adminer ─────────────────────────────────────
  adminer:
    image: adminer
    container_name: adminer
    restart: unless-stopped
    ports:
      - "8080:8080"

# ── Volumes ───────────────────────────────────────
volumes:
  pgdata: